name: Pokemon Restock Monitor

# Runs automatically on a schedule, and can be run by hand from the Actions tab.
on:
  schedule:
    # Every 5 minutes is the fastest GitHub allows. (May run a bit late when GitHub is busy.)
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

# Let the job save state.json back to the repo so it doesn't re-alert every run.
permissions:
  contents: write

# If a run is still going when the next fires, skip rather than stack them up.
concurrency:
  group: restock-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          REDSKY_KEY: ${{ secrets.REDSKY_KEY }}
        run: python monitor.py

      - name: Remember what we alerted (save state)
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "restock-bot"
            git config user.email "bot@users.noreply.github.com"
            git add state.json
            git commit -m "update state [skip ci]"
            git push
          else
            echo "No state change."
          fi
